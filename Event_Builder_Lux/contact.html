<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETERNAL | Contact</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,400;1,600&family=Montserrat:wght@200;300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --gold-primary: #D4AF37; --gold-gradient: linear-gradient(135deg, #BF953F, #FCF6BA, #B38728, #FBF5B7, #AA771C); --dark-bg: #0A0A0A; --panel-bg: #111111; }
        body { background-color: var(--dark-bg); color: #fff; font-family: 'Montserrat', sans-serif; letter-spacing: 0.02em; }
        .serif { font-family: 'Cormorant Garamond', serif; }
        .text-gold { background: var(--gold-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .portfolio-bar { background: rgba(0,0,0,0.8); backdrop-filter: blur(15px); padding: 12px 0; text-align: center; position: sticky; top: 0; z-index: 10000; border-bottom: 1px solid rgba(255,255,255,0.1); width: 100%; }
        .back-btn-holo-global { display: inline-flex; align-items: center; gap: 10px; padding: 8px 24px; background: rgba(255, 255, 255, 0.05); border: 2px solid rgba(0, 242, 255, 0.3); border-radius: 50px; color: #fff; text-decoration: none; font-weight: 800; font-size: 10px; text-transform: uppercase; box-shadow: 0 10px 25px rgba(0,0,0,0.3); animation: holo-float 4s infinite ease-in-out; }
        @keyframes holo-float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }

        .glass-panel { background: rgba(17, 17, 17, 0.6); border: 1px solid rgba(212, 175, 55, 0.1); backdrop-filter: blur(10px); }
        .input-lux { background: transparent; border: none; border-bottom: 1px solid rgba(255,255,255,0.1); padding: 12px 0; font-size: 10px; color: #fff; width: 100%; outline: none; transition: 0.3s; text-transform: uppercase; letter-spacing: 0.1em; }
        .input-lux::placeholder { color: rgba(255,255,255,0.3); }
        .input-lux:focus { border-color: var(--gold-primary); }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body class="h-screen w-screen overflow-hidden flex flex-col antialiased selection:bg-yellow-900 selection:text-white">

    <!-- ACHIKO10 GLOBAL PREMIUM BACK BAR -->
    <div class="portfolio-bar-global shrink-0" style="background: linear-gradient(180deg, #050505 0%, rgba(5,5,5,0.9) 100%); backdrop-filter: blur(20px); padding: 16px 24px; display: flex; justify-content: center; align-items: center; position: relative; z-index: 99999; border-bottom: 1px solid rgba(0, 242, 255, 0.15); box-shadow: 0 10px 40px rgba(0,0,0,0.8);">
        <a href="../index.html" style="display: inline-flex; align-items: center; gap: 12px; padding: 12px 32px; background: rgba(0, 242, 255, 0.05); border: 1px solid rgba(0, 242, 255, 0.4); border-radius: 50px; color: #fff; text-decoration: none; font-weight: 900; font-size: 13px; text-transform: uppercase; letter-spacing: 0.15em; transition: all 0.3s ease; box-shadow: 0 0 25px rgba(0, 242, 255, 0.15);">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#00f2ff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
            ACHIKO10 პორტფოლიო
        </a>
    </div>


    

    <header class="h-16 shrink-0 border-b border-[#1a1a1a] bg-[#050505] flex justify-between items-center px-6 z-50">
        <div class="flex items-center gap-4">
            <i data-lucide="diamond" class="w-5 h-5 text-yellow-600"></i>
            <span class="text-xl serif italic tracking-[0.2em] font-light text-gold">ETERNAL</span>
        </div>
        <div class="flex items-center gap-4 text-[9px] uppercase tracking-widest font-bold text-stone-500">
            <span class="flex items-center gap-2"><span class="w-1.5 h-1.5 rounded-full bg-yellow-600 animate-pulse"></span> Concierge Active</span>
        </div>
    </header>

    <main class="flex-1 overflow-hidden flex bg-[#080808]">
        
        <aside class="w-64 shrink-0 border-r border-[#1a1a1a] bg-[#050505] flex flex-col justify-between py-8">
            <nav class="space-y-2 px-6">
                <p class="text-[8px] uppercase tracking-[0.3em] text-stone-600 font-bold mb-6">მენიუ</p>
                <a href="index.html" class="flex items-center gap-4 px-4 py-3 rounded border border-transparent text-[10px] font-bold uppercase tracking-widest text-stone-500 hover:text-white hover:bg-[#111] transition"><i data-lucide="layout-grid" class="w-4 h-4"></i> მიმოხილვა</a>
                <a href="builder.html" class="flex items-center gap-4 px-4 py-3 rounded border border-transparent text-[10px] font-bold uppercase tracking-widest text-stone-500 hover:text-white hover:bg-[#111] transition"><i data-lucide="sliders" class="w-4 h-4"></i> კონფიგურატორი</a>
                <a href="packages.html" class="flex items-center gap-4 px-4 py-3 rounded border border-transparent text-[10px] font-bold uppercase tracking-widest text-stone-500 hover:text-white hover:bg-[#111] transition"><i data-lucide="award" class="w-4 h-4"></i> პაკეტები</a>
                <a href="contact.html" class="flex items-center gap-4 px-4 py-3 bg-[#111] rounded border border-yellow-600/30 text-[10px] font-bold uppercase tracking-widest text-gold shadow-[0_0_15px_rgba(212,175,55,0.05)] transition"><i data-lucide="mail" class="w-4 h-4"></i> კონტაქტი</a>
            </nav>
        </aside>

        <section class="flex-1 overflow-y-auto p-8 lg:p-12 flex items-center justify-center">
            <div class="glass-panel rounded-lg w-full max-w-4xl flex flex-col md:flex-row overflow-hidden border-[#1a1a1a]">
                
                <div class="p-10 flex-1 border-r border-[#1a1a1a]">
                    <h2 class="text-3xl serif italic text-gold font-light mb-8">მოგვწერეთ</h2>
                    <form class="space-y-6" id="contactForm">
                        <input type="text" placeholder="თქვენი სახელი" class="input-lux" required>
                        <input type="email" placeholder="ელ-ფოსტა" class="input-lux" required>
                        <textarea placeholder="როგორია თქვენი საოცნებო ივენთი?" class="input-lux h-24 resize-none" required></textarea>
                        <button type="submit" class="w-full bg-gradient-to-r from-yellow-700 to-yellow-500 text-black py-4 mt-4 text-[9px] uppercase tracking-widest font-bold rounded hover:opacity-90 transition">
                            შეტყობინების გაგზავნა
                        </button>
                    </form>
                </div>

                <div class="p-10 w-full md:w-80 bg-[#050505] flex flex-col justify-center relative overflow-hidden">
                    <div class="absolute inset-0 bg-[radial-gradient(circle_at_top_right,rgba(212,175,55,0.05),transparent_50%)]"></div>
                    <div class="relative z-10">
                        <p class="text-[8px] uppercase tracking-[0.4em] text-stone-600 font-bold mb-8">კონსიერჟი</p>
                        <div class="space-y-8">
                            <div>
                                <p class="text-[8px] uppercase tracking-widest text-stone-500 mb-1">ოფისი</p>
                                <p class="text-lg serif italic text-white">თბილისი, ი. აბაშიძის 34</p>
                            </div>
                            <div>
                                <p class="text-[8px] uppercase tracking-widest text-stone-500 mb-1">პირდაპირი ხაზი</p>
                                <p class="text-xs font-mono text-white">+995 577 00 00 00</p>
                            </div>
                            <div>
                                <p class="text-[8px] uppercase tracking-widest text-stone-500 mb-1">ელ-ფოსტა</p>
                                <p class="text-[10px] text-gold font-mono">concierge@eternal.ge</p>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </section>
    </main>

    <footer class="h-10 shrink-0 border-t border-[#1a1a1a] bg-[#050505] flex justify-between items-center px-6 z-50">
        <div class="text-[9px] font-bold uppercase tracking-widest text-stone-600">
            &copy; 2026 ETERNAL EVENTS
        </div>
        <div class="text-[9px] font-bold uppercase tracking-widest text-stone-500">
            PLATINUM EDITION BY <span class="text-white italic">ACHIKO10</span>
        </div>
    </footer>

    <script>
        lucide.createIcons();
        
        // Premium gold toast
        const toastEl = document.createElement('div');
        toastEl.style.cssText = 'position:fixed;bottom:2rem;right:2rem;background:#0c0c0c;border:1px solid rgba(212,175,55,0.5);color:#D4AF37;padding:16px 24px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.15em;border-radius:6px;transform:translateY(60px);opacity:0;transition:all 0.5s cubic-bezier(0.4,0,0.2,1);z-index:99999;box-shadow:0 20px 40px rgba(0,0,0,0.8);';
        document.body.appendChild(toastEl);
        function showGoldToast(msg){
          toastEl.textContent=msg;
          toastEl.style.opacity='1'; toastEl.style.transform='translateY(0)';
          setTimeout(()=>{toastEl.style.opacity='0'; toastEl.style.transform='translateY(60px)';},4000);
        }

        document.getElementById('contactForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const inputs = e.target.querySelectorAll('input, textarea');
            let valid = true;
            inputs.forEach(inp => {
              if(!inp.value.trim()){
                inp.style.borderColor='#c0392b'; valid=false;
              } else {
                inp.style.borderColor='';
              }
            });
            // email check
            const emailEl = e.target.querySelector('input[type="email"]');
            if(emailEl && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(emailEl.value)){
              emailEl.style.borderColor='#c0392b'; valid=false;
            }
            if(!valid) return;
            showGoldToast('✓ შეტყობინება გაიგზავნა — Concierge დაგიკავშირდება');
            e.target.reset();
        });
    </script>
</body>
</html>
