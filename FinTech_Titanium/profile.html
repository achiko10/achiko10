    <script>
    lucide.createIcons();
    
    // Profile settings save toast
    const profToast = document.createElement('div');
    profToast.style.cssText = 'position:fixed;bottom:1.5rem;right:1.5rem;background:#14161a;border:1px solid #2d3139;color:#00ffaa;padding:12px 20px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;border-radius:8px;transform:translateY(50px);opacity:0;transition:all 0.4s;z-index:99999;';
    document.body.appendChild(profToast);
    function showProfToast(msg){profToast.textContent=msg;profToast.style.opacity='1';profToast.style.transform='translateY(0)';setTimeout(()=>{profToast.style.opacity='0';profToast.style.transform='translateY(50px)';},3500);}

    // Add "Save Settings" button after the space-y-6 div

        const prefs = { theme: 'dark', notifications: true, 2: 'TITAN-9028X', saved: new Date().toISOString() };
        try { localStorage.setItem('titan_profile', JSON.stringify(prefs)); } catch(e) {}
        showProfToast('✓ პარამეტრები შენახულია');
      });
      settingsDiv.after(saveBtn);
    }
    
    // Load saved preferences
    try {
      const saved = localStorage.getItem('titan_profile');
      if(saved) { const p = JSON.parse(saved); /* apply prefs */ }
