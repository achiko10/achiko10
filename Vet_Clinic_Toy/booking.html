<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>დაჯავშნა | Premium Vet Services</title>
    <meta name="description" content="PET TOY CLINIC | Premium Vet-Service - ACHIKO10 Platinum Portfolio.">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { 
            --accent-primary: #FF7B93; 
            --accent-secondary: #4FBFFF; 
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.5);
        }
        body { 
            background-color: #FAFAFB; 
            background-image: 
                radial-gradient(at 0% 0%, hsla(353,100%,96%,1) 0px, transparent 50%),
                radial-gradient(at 100% 0%, hsla(201,100%,96%,1) 0px, transparent 50%),
                radial-gradient(at 100% 100%, hsla(353,100%,96%,1) 0px, transparent 50%),
                radial-gradient(at 0% 100%, hsla(201,100%,96%,1) 0px, transparent 50%);
            color: #1E293B; 
            font-family: 'Outfit', sans-serif; 
            overflow-x: hidden;
        }
        
        .glass-card { 
            background: var(--glass-bg); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border); 
            border-radius: 32px; 
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.05); 
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        .floating-nav { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(24px); border-bottom: 1px solid rgba(255,255,255,0.6); position: sticky; top: 0; z-index: 50; }
        .btn-premium { background: linear-gradient(135deg, var(--accent-primary), #FF5475); color: white; padding: 16px 36px; border-radius: 100px; font-weight: 800; font-size: 12px; text-transform: uppercase; letter-spacing: 0.15em; transition: all 0.3s ease; box-shadow: 0 15px 30px rgba(255, 123, 147, 0.3); display: inline-flex; align-items: center; justify-content: center; gap: 12px; border: 2px solid transparent; width: 100%; cursor: pointer;}
        .btn-premium:hover { transform: translateY(-2px) scale(1.02); box-shadow: 0 20px 40px rgba(255, 123, 147, 0.4); border-color: rgba(255,255,255,0.5); }
        .portfolio-bar { background: #050505; color: white; padding: 12px 0; text-align: center; font-size: 10px; font-weight: 900; letter-spacing: 0.2em; text-transform: uppercase; }
        .portfolio-bar a { color: #00f2ff; text-decoration: none; display: inline-flex; align-items: center; gap: 8px; transition: 0.3s; }
        .portfolio-bar a:hover { color: white; }
        
        .input-glass { background: rgba(255,255,255,0.5); border: 2px solid rgba(255,255,255,0.8); border-radius: 20px; padding: 16px; font-size: 14px; font-weight: 500; transition: 0.3s; width: 100%; outline: none; color: #1E293B; backdrop-filter: blur(10px); }
        .input-glass:focus { border-color: var(--accent-primary); background: white; box-shadow: 0 0 0 4px rgba(255, 123, 147, 0.1); }
    </style>
</head>
<body class="antialiased selection:bg-pink-200 selection:text-pink-900 h-screen w-screen overflow-hidden flex flex-col">

    <!-- ACHIKO10 GLOBAL PREMIUM BACK BAR -->
    <div class="portfolio-bar-global shrink-0" style="background: linear-gradient(180deg, #050505 0%, rgba(5,5,5,0.9) 100%); backdrop-filter: blur(20px); padding: 16px 24px; display: flex; justify-content: center; align-items: center; position: relative; z-index: 99999; border-bottom: 1px solid rgba(0, 242, 255, 0.15); box-shadow: 0 10px 40px rgba(0,0,0,0.8);">
        <a href="../index.html" style="display: inline-flex; align-items: center; gap: 12px; padding: 12px 32px; background: rgba(0, 242, 255, 0.05); border: 1px solid rgba(0, 242, 255, 0.4); border-radius: 50px; color: #fff; text-decoration: none; font-weight: 900; font-size: 13px; text-transform: uppercase; letter-spacing: 0.15em; transition: all 0.3s ease; box-shadow: 0 0 25px rgba(0, 242, 255, 0.15);">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#00f2ff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
            ACHIKO10 პორტფოლიო
        </a>
    </div>

    


    

    <header class="floating-nav shrink-0">
        <div class="max-w-7xl mx-auto px-6 md:px-12 py-5 flex justify-between items-center">
            <a href="index.html" class="text-2xl md:text-3xl font-black tracking-tighter flex items-center gap-2 hover:scale-105 transition-transform">
                <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-pink-400 to-rose-500 flex items-center justify-center text-white shadow-lg shadow-pink-500/30">
                    <i data-lucide="bone" class="w-5 h-5"></i>
                </div>
                PET <span class="text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-cyan-400">TOY.</span>
            </a>
            <nav class="hidden md:flex gap-10 text-[11px] font-bold uppercase tracking-[0.15em] text-slate-500">
                <a href="index.html" class="hover:text-pink-500 transition-colors">მთავარი</a>
                <a href="pet-profile.html" class="hover:text-pink-500 transition-colors">პროფილები</a>
                <a href="booking.html" class="text-slate-900">დაჯავშნა</a>
                <a href="contact.html" class="hover:text-pink-500 transition-colors">კონტაქტი</a>
            </nav>
            <a href="contact.html" class="btn-premium hidden md:flex !w-auto !py-3 !px-6 !text-[10px]">
                დაგვიკავშირდით
            </a>
            <button class="md:hidden text-slate-900"><i data-lucide="menu" class="w-6 h-6"></i></button>
        </div>
    </header>

    <main class="max-w-2xl mx-auto px-6 py-16 md:py-24 flex-1 overflow-y-auto">
        <div class="glass-card p-10 md:p-14 relative overflow-hidden">
            <div class="absolute -top-20 -right-20 w-64 h-64 bg-gradient-to-br from-pink-300 to-rose-300 rounded-full blur-3xl opacity-30 pointer-events-none"></div>
            
            <div class="text-center mb-10 relative z-10">
                <div class="w-16 h-16 bg-gradient-to-br from-pink-100 to-rose-100 rounded-2xl mx-auto flex items-center justify-center text-pink-500 mb-6 shadow-sm border border-pink-200">
                    <i data-lucide="calendar-check" class="w-8 h-8"></i>
                </div>
                <h1 class="text-3xl md:text-4xl font-black mb-2 tracking-tight text-slate-900">ვიზიტის დაჯავშნა</h1>
                <p class="text-slate-500 text-sm font-medium">აირჩიეთ სასურველი სერვისი და დრო თქვენი პატარა მეგობრისთვის.</p>
            </div>

            <!-- Toast -->
            <div id="vet-toast" style="display:none;padding:14px 20px;background:rgba(255,255,255,0.9);color:#1e293b;border:2px solid #FF7B93;border-radius:20px;font-weight:700;font-size:.85rem;margin-bottom:20px;backdrop-filter:blur(10px);">🐾 ჯავშანი წარმატებით დასტურდა! მოგელოდებით.</div>
            
            <form class="space-y-6 relative z-10" id="vet-booking-form">
                <div>
                    <label class="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-4 mb-2 block">სერვისი *</label>
                    <div class="relative">
                        <select class="input-glass appearance-none cursor-pointer" id="vet-svc">
                            <option value="">-- სერვისი --</option>
                            <option>ვეტ-კლინიკა (კონსულტაცია)</option>
                            <option>PET სასტუმრო (დაჯავშნა)</option>
                            <option>პრემიუმ გრუმინგი</option>
                            <option>ვაქცინაცია</option>
                            <option>ოპერაცია (სტერილიზაცია)</option>
                        </select>
                        <i data-lucide="chevron-down" class="w-4 h-4 text-slate-400 absolute right-6 top-1/2 -translate-y-1/2 pointer-events-none"></i>
                    </div>
                </div>
                
                <div>
                    <label class="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-4 mb-2 block">ცხოველის სახელი *</label>
                    <input type="text" class="input-glass" id="vet-pet" placeholder="მაგ. ბუბუ">
                </div>
                
                <div>
                    <label class="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-4 mb-2 block">მეპატრონის სახელი *</label>
                    <input type="text" class="input-glass" id="vet-owner" placeholder="სახელი გვარი">
                </div>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-4 mb-2 block">თარიღი *</label>
                        <input type="date" class="input-glass" id="vet-date">
                    </div>
                    <div>
                        <label class="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-4 mb-2 block">დრო *</label>
                        <select class="input-glass" id="vet-time">
                            <option>09:00</option><option>10:00</option><option>11:00</option>
                            <option>12:00</option><option>13:00</option><option>14:00</option>
                            <option>15:00</option><option>16:00</option><option>17:00</option>
                        </select>
                    </div>
                </div>
                
                <p id="vet-err" style="color:#e11d48;font-size:.8rem;font-weight:700;display:none;margin:0;padding-left:1rem;"></p>

                <div class="pt-2">
                    <button type="submit" class="btn-premium">
                        დაჯავშნის დადასტურება <i data-lucide="arrow-right" class="w-4 h-4"></i>
                    </button>
                </div>
            </form>
        </div>
    </main>

    
    <footer class="h-12 shrink-0 bg-[#0a0a0a] text-stone-400 border-t border-white/10 flex justify-between items-center px-6 z-50 text-[9px] font-bold uppercase tracking-[0.2em]">
        <div>&copy; 2026 დაჯავშნა</div>
        <div>PLATINUM EDITION BY <span class="text-white">ACHIKO10</span></div>
    </footer>


    <script>
        lucide.createIcons();
        document.getElementById('vet-booking-form').addEventListener('submit', (e) => {
            e.preventDefault();
            var svc = document.getElementById('vet-svc').value;
            var pet = document.getElementById('vet-pet').value.trim();
            var owner = document.getElementById('vet-owner').value.trim();
            var date = document.getElementById('vet-date').value;
            var err = document.getElementById('vet-err');
            err.style.display = 'none';
            if(!svc){err.textContent='სერვისი სავალდებულოა';err.style.display='block';return;}
            if(!pet){err.textContent='ცხოველის სახელი სავალდებულოა';err.style.display='block';return;}
            if(!owner){err.textContent='მეპატრონის სახელი სავალდებულოა';err.style.display='block';return;}
            if(!date){err.textContent='გთხოვთ მიუთითოთ თარიღი';err.style.display='block';return;}
            var t = document.getElementById('vet-toast');
            t.style.display = 'block';
            e.target.reset();
            setTimeout(()=>{t.style.display='none';}, 4000);
        });
    </script>
</body>
</html>
